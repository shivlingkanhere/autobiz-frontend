kind = "web"
previewPath = "/"
title = "AutoBiz AI"
version = "1.0.0"
id = "artifacts/autobiz-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21828

[services.development]
run = "pnpm --filter @workspace/autobiz-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autobiz-ai", "run", "build" ]
publicDir = "artifacts/autobiz-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21828"
BASE_PATH = "/"
